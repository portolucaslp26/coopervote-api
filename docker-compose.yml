services:
  postgres:
    image: postgres:16-alpine
    container_name: coopervote-postgres
    environment:
      POSTGRES_USER: coopervote
      POSTGRES_PASSWORD: coopervote123
      POSTGRES_DB: coopervote
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coopervote"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    image: coopervote/api:latest
    container_name: coopervote-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/coopervote
      SPRING_DATASOURCE_USERNAME: coopervote
      SPRING_DATASOURCE_PASSWORD: coopervote123
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: coopervote-network
